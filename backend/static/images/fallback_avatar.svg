<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none">
  <!-- Background -->
  <rect width="480" height="480" fill="#0c0b11"/>

  <!-- Subtle grain -->
  <filter id="grain" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
    <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blended"/>
    <feComposite in="blended" in2="SourceGraphic" operator="in"/>
  </filter>
  <rect width="480" height="480" fill="rgba(255,255,255,0.025)" filter="url(#grain)"/>

  <!-- Outer measurement ring — dashed, very subtle -->
  <circle cx="240" cy="240" r="205"
    stroke="rgba(255,255,255,0.05)"
    stroke-width="1"
    stroke-dasharray="3 9"/>

  <!-- Full-width crosshair -->
  <line x1="0"   y1="240" x2="480" y2="240" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="240" y1="0"   x2="240" y2="480" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Registration circles at 12 / 3 / 6 / 9 o'clock -->
  <circle cx="240" cy="45"  r="11" stroke="rgba(255,255,255,0.13)" stroke-width="1.2" fill="none"/>
  <circle cx="435" cy="240" r="11" stroke="rgba(255,255,255,0.13)" stroke-width="1.2" fill="none"/>
  <circle cx="240" cy="435" r="11" stroke="rgba(255,255,255,0.13)" stroke-width="1.2" fill="none"/>
  <circle cx="45"  cy="240" r="11" stroke="rgba(255,255,255,0.13)" stroke-width="1.2" fill="none"/>

  <!-- Tick marks through registration circles -->
  <line x1="240" y1="33"  x2="240" y2="57"  stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <line x1="228" y1="45"  x2="252" y2="45"  stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <line x1="435" y1="228" x2="435" y2="252" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <line x1="423" y1="240" x2="447" y2="240" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <line x1="240" y1="423" x2="240" y2="447" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <line x1="228" y1="435" x2="252" y2="435" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <line x1="45"  y1="228" x2="45"  y2="252" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <line x1="33"  y1="240" x2="57"  y2="240" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- Center outer ring -->
  <circle cx="240" cy="240" r="36"
    stroke="rgba(255,255,255,0.18)"
    stroke-width="1.5"
    fill="none"/>

  <!-- Center inner ring — amber accent -->
  <circle cx="240" cy="240" r="15"
    stroke="#c4a044"
    stroke-width="1.5"
    fill="none"
    opacity="0.6"/>

  <!-- Center dot — amber -->
  <circle cx="240" cy="240" r="3.5" fill="#c4a044" opacity="0.75"/>
</svg>
